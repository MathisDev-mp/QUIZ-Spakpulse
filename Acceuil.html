<!DOCTYPE html>
<html lang="fr" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparpulse | L'interaction à vif</title>
  <link rel="stylesheet" href="lo.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header avec logo et toggle thème -->
    <header class="header">
      <div class="logo">
        <img src="logo.png" alt="Logo Sparpulse" class="logo-img">
        <h1 class="logo-text">Sparpulse</h1>
      </div>
      <div class="slogan">L'interaction à vif</div>
      <button class="theme-toggle" aria-label="Changer de thème">
        <span class="theme-icon sun">☀️</span>
        <span class="theme-icon moon">🌙</span>
      </button>
    </header>

    <!-- Section principale -->
    <main class="main-content">
      <!-- Bouton Jouer -->
      <section class="cta-section">
        <a href="Quiz.html">
        <button class="btn-primary">Jouer maintenant</button>
        </a>
        <a href="chat.html">
         <button class="btn-primary">Accéder à la ligue</button>
        </a> 
        </a>
      </section>

      <!-- Meilleur score -->
      <section class="best-scores">
        <h2 class="section-title">🏆 Meilleur score</h2>
        <div class="scores-list">
          <div class="score-item">
            <span class="rank">1</span>
            <span class="player-name">Joueur1</span>
            <span class="player-score">95%</span>
          </div>
          <div class="score-item">
            <span class="rank">2</span>
            <span class="player-name">Joueur2</span>
            <span class="player-score">88%</span>
          </div>
          <div class="score-item">
            <span class="rank">3</span>
            <span class="player-name">Joueur3</span>
            <span class="player-score">82%</span>
          </div>
        </div>
      </section>

      <!-- Thèmes disponibles -->
      <section class="themes-section">
        <h2 class="section-title">🎯 Thèmes disponibles</h2>
        <div class="themes-grid">
          <div class="theme-card" data-theme="science">
            <div class="theme-icon">🧪</div>
            <span class="theme-name">Science</span>
          </div>
          <div class="theme-card" data-theme="history">
            <div class="theme-icon">📜</div>
            <span class="theme-name">Histoire</span>
          </div>
          <div class="theme-card" data-theme="cinema">
            <div class="theme-icon">🎬</div>
            <span class="theme-name">Cinéma</span>
          </div>
          <div class="theme-card" data-theme="tech">
            <div class="theme-icon">💻</div>
            <span class="theme-name">Technologie</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 Sparpulse. Tous droits réservés.</p>
    </footer>
  </div>

  <!-- Script pour le toggle thème -->
  <script>
    const themeToggle = document.querySelector('.theme-toggle');
    const body = document.body;

    // Charger le thème sauvegardé
    const savedTheme = localStorage.getItem('theme') || 'light';
    body.classList = savedTheme;

    // Mettre à jour l'icône du toggle
    updateThemeIcon(savedTheme);

    // Écouter le clic sur le toggle
    themeToggle.addEventListener('click', () => {
      const newTheme = body.classList.contains('light') ? 'dark' : 'light';
      body.classList = newTheme;
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    // Fonction pour mettre à jour l'icône
    function updateThemeIcon(theme) {
      const sunIcon = themeToggle.querySelector('.sun');
      const moonIcon = themeToggle.querySelector('.moon');
      if (theme === 'dark') {
        sunIcon.style.display = 'inline';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'inline';
      }
    }

    // Animation pour les cartes de thèmes
    document.querySelectorAll('.theme-card').forEach(card => {
      card.addEventListener('click', () => {
        // Retirer la classe active de toutes les cartes
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
        // Ajouter la classe active à la carte cliquée
        card.classList.add('active');
      });
    });
  </script>
  <script src="acc.js"></script>
  <script src="config.js"></script>
  <script src="sécurite.js"></script>
  <script src="thème.js"></script>
  <script src="firebase-config.js"></script>
</body>
</html>
